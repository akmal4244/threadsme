# Nginx reverse proxy example for ThreadsMe.
# Replace threadsme.example.com and certificate paths before use.

server {
    listen 80;
    server_name threadsme.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name threadsme.example.com;

    ssl_certificate /etc/letsencrypt/live/threadsme.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/threadsme.example.com/privkey.pem;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location /threadsme/ {
        proxy_pass http://127.0.0.1:8791/threadsme/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8788/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 2m;
    }
}
