name: ThreadsMe CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Syntax check
        run: npm run check

      - name: Smoke QA
        run: npm run qa:smoke

      - name: Production safety QA
        run: npm run qa:production

      - name: Static server hardening QA
        run: node scripts/qa-static-server.mjs

      - name: Story audit
        run: npm run audit:stories

      - name: Extension syntax
        run: |
          node --check threadsme-extension/src/background.js
          node --check threadsme-extension/src/content.js
          node --check threadsme-extension/src/popup.js
          node -e "JSON.parse(require('fs').readFileSync('threadsme-extension/manifest.json','utf8'))"
